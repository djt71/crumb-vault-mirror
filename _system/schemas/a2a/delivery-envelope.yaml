# Delivery Envelope Schema
# Every Tess-to-Danny delivery carries this metadata.
# Tess tracks envelope fields internally; they appear in
# delivery-log.yaml, feedback ledger, and learning log.
#
# Project: agent-to-agent-communication (A2A-001)
# Spec reference: §7.1, §7.2, §8.3

envelope:
  correlation_id:
    type: string
    format: uuidv7
    required: true
    description: >
      UUIDv7, generated by Tess at orchestration decision time. Links the
      full lifecycle: trigger → dispatch → delivery → feedback → learning log.
      UUIDv7 chosen for temporal ordering consistency with CTB-016 dispatch_id.

  dispatch_id:
    type: string
    format: uuidv7
    required: false
    description: >
      CTB-016 dispatch_id when delivery follows a Crumb dispatch.
      Omitted for Tess-originated deliveries (e.g., context refresh alerts,
      status updates).

  workflow:
    type: string
    required: true
    enum:
      - compound-insight    # W1 — feed intel cross-referencing
      - research            # W2 — research pipeline
      - se-account-prep     # W3 — pre-call brief preparation
      - gardening           # W4 — vault maintenance
      - operational         # monitoring, alerts, status
      - ad-hoc              # one-off deliveries outside formal workflows

  intent:
    type: string
    required: true
    enum:
      - notify    # short alert, status update, prompt for action
      - present   # structured artifact for review
      - approve   # HITL gate requiring decision (AID-*)
      - feedback  # request signal on a delivered artifact
      - converse  # interactive exchange

  content:
    type: string
    required: true
    description: >
      Message body. Adapter handles channel-specific truncation and formatting.
      For Telegram: truncated at 4096 chars with "[full artifact at {artifact_path}]".

  artifact_paths:
    type: array
    items:
      type: string
    required: false
    description: >
      Vault-relative paths to durable artifacts associated with this delivery.
      Artifacts are channel-neutral — adapters format/truncate for display.

  timestamps:
    type: object
    required: true
    properties:
      created_at:
        type: string
        format: iso8601
        description: When the delivery was initiated by Tess.
      delivered_at:
        type: string
        format: iso8601
        description: When the adapter confirmed delivery. Written by adapter.

  cost:
    type: object
    required: false
    properties:
      model:
        type: string
      input_tokens:
        type: integer
      output_tokens:
        type: integer
      estimated_cost_usd:
        type: number
    description: Cost metadata from Crumb dispatch, if applicable.

  channel:
    type: string
    required: true
    enum:
      - telegram   # Phase 1
      - web-ui     # Phase 2+
      - discord    # Future
    description: >
      Channel this delivery was sent through. Written by adapter.

  channel_metadata:
    type: object
    required: false
    description: >
      Channel-specific metadata. For Telegram: message thread context.
      For web-ui: page/component reference. Extensible per adapter.

# ---
# Passthrough verification (A2A-001, 2026-03-06):
# OpenClaw Telegram delivery does NOT support correlation_id/intent
# metadata passthrough. Dispatch state files track deliverables (file paths)
# but no channel-level metadata is returned to the agent.
#
# Mitigation: delivery-log.yaml provides the audit trail. Each delivery
# is logged with full envelope fields alongside the Telegram send.
# Feedback-to-delivery matching uses recency within workflow context.
