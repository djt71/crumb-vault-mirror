# Skill Preflight Map
# Consumed by _system/scripts/skill-preflight.sh (PreToolUse hook on Skill)
#
# Fields:
#   kb_eligible: bool — run knowledge-retrieve.sh for this skill
#   query_hints: list — extra BM25 keywords appended to skill args
#   reminders: list — procedural obligations surfaced as additionalContext
#   required_inputs: list — soft deps; warn in additionalContext if missing
#   critical_inputs: list — hard deps; DENY the skill if missing (with guidance)
#
# Skills not listed here: default to kb_eligible=true, no reminders, no validation.
# Skills in the bash fast-path (sync, checkpoint, etc.) never reach this file.

attention-manager:
  kb_eligible: true
  query_hints:
    - attention
    - focus
    - priority
    - cognitive
    - time management
  reminders:
    - "Write context inventory to run-log after loading context"
    - "Compound reflection at phase transitions (Context Checkpoint Protocol)"
  required_inputs: []
  critical_inputs:
    - _system/docs/goal-tracker.yaml

